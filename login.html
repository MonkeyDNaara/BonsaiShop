<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Bonsai Shop</title>
    <link rel="stylesheet" href="/Styles/style.css" />
  </head>
  <body>
    <header class="header">
      <button class="header__button header__button--menu">☰</button>
      <a class="header__title" href="/index.html">Bonsai Shop</a>
      <a class="header__button header__button--login" href="/login.html"
        >Login</a
      >
    </header>

    <main>
      <div class="login-container">
        <h2>Anmelden</h2>
        <form class="login-form">
          <label for="login-user">Benutzername oder E-Mail</label>
          <input
            id="login-user"
            type="email"
            placeholder="example@example.com"
            required
          />

          <label class="login-form__password-label" for="login-password"
            >Passwort</label
          >
          <input
            id="login-password"
            type="password"
            placeholder="Passwort"
            required
          />

          <button class="login-form__button" type="submit">Anmelden</button>
        </form>
      </div>
    </main>
  </body>
</html>
