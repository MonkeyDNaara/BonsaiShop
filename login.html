<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home - Bonsai Shop</title>
    <link rel="stylesheet" href="/Styles/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="header__menu">
        <button class="header__button header__button--menu">☰</button>

        <nav class="header__dropdown">
          <ul class="header__dropdown-list">
            <li><a href="/index.html">Home</a></li>
            <li><a href="/products.html">Produkte</a></li>
            <li><a href="/templates.html">Templates</a></li>
            <li><a href="/price.html">Preise</a></li>
            <li><a href="/reviews.html">Reviews</a></li>
          </ul>
        </nav>
      </div>
      <h1><a class="header__title" href="/index.html">Bonsai Shop</a></h1>
      <a class="header__button header__button--login" href="/login.html"
        >Login</a
      >
    </header>

    <main>
      <div class="login-container">
        <h2>Anmelden</h2>
        <form class="login-form">
          <label for="login-user">Benutzername oder E-Mail</label>
          <input
            id="login-user"
            type="email"
            placeholder="example@example.com"
            required
          />

          <label class="login-form__password-label" for="login-password"
            >Passwort</label
          >
          <input
            id="login-password"
            type="password"
            placeholder="Passwort"
            required
          />

          <button class="login-form__button" type="submit">Anmelden</button>
        </form>
      </div>
    </main>
    <footer>
      <div class="footer-container">
        <nav>
          <div class="footer-item-container">
            <div class="footer-item"><a href="">About Us</a></div>
            <div class="footer-item"><a href="">Impressum</a></div>
            <div class="footer-item"><a href="">Social Networks</a></div>
            <div class="footer-item"><a href="">Carreer</a></div>
            <div class="footer-item"><a href="">Support</a></div>
          </div>
        </nav>
        <div class="footer-copyright">© by Elias & Niko</div>
      </div>
    </footer>
  </body>
</html>
